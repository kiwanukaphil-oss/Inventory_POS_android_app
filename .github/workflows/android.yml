name: Android verification

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Prepare Gradle wrapper
        run: chmod +x gradlew
      - name: Verify debug and minified staging builds
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug assembleStaging --stacktrace
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-verification-reports
          path: |
            app/build/reports/
            app/build/outputs/apk/debug/
            app/build/outputs/apk/staging/
          retention-days: 14

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  device-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Prepare Gradle wrapper
        run: chmod +x gradlew
      - name: Run database migration and accessibility tests
        uses: reactivecircus/android-emulator-runner@v2.38.0
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest --stacktrace
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-device-test-reports
          path: app/build/reports/androidTests/
          retention-days: 14
